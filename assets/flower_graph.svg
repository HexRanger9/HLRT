<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 420" width="580" height="420">
  <defs>
    <style>
      .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; fill: #c9d1d9; }
      .label-bold { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; fill: #c9d1d9; font-weight: bold; }
      .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 16px; fill: #e6edf3; font-weight: bold; }
      .subtitle { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #8b949e; }
      .vertex-dot { fill: #e6edf3; stroke: #0d1117; stroke-width: 1; }
      .edge-line { stroke: #8b949e; stroke-width: 1.5; stroke-opacity: 0.6; }
      .legend-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #c9d1d9; }
      .legend-val { font-family: 'Consolas', 'Courier New', monospace; font-size: 12px; fill: #79c0ff; }
    </style>
    <!-- Pointy-top hexagon template -->
    <polygon id="hex" points="0,-52 45,-26 45,26 0,52 -45,26 -45,-26" />
  </defs>

  <!-- Background -->
  <rect width="580" height="420" rx="8" fill="#0d1117" />
  <rect x="1" y="1" width="578" height="418" rx="7" fill="none" stroke="#30363d" stroke-width="1" />

  <!-- Title -->
  <text x="290" y="32" text-anchor="middle" class="title">7-Cell Hexagonal Flower Graph</text>
  <text x="290" y="50" text-anchor="middle" class="subtitle">The fundamental blocking unit of the HLRT lattice</text>

  <!-- Flower graph — centered at (200, 225) -->
  <g transform="translate(200, 230)">

    <!-- Petal hexagons (colored) -->
    <!-- Petal 1 (top) -->
    <use href="#hex" x="0" y="-90" fill="#1a3a5c" fill-opacity="0.85" stroke="#58a6ff" stroke-width="2"/>
    <!-- Petal 2 (upper-right) -->
    <use href="#hex" x="78" y="-45" fill="#1a3a5c" fill-opacity="0.85" stroke="#58a6ff" stroke-width="2"/>
    <!-- Petal 3 (lower-right) -->
    <use href="#hex" x="78" y="45" fill="#1a3a5c" fill-opacity="0.85" stroke="#58a6ff" stroke-width="2"/>
    <!-- Petal 4 (bottom) -->
    <use href="#hex" x="0" y="90" fill="#1a3a5c" fill-opacity="0.85" stroke="#58a6ff" stroke-width="2"/>
    <!-- Petal 5 (lower-left) -->
    <use href="#hex" x="-78" y="45" fill="#1a3a5c" fill-opacity="0.85" stroke="#58a6ff" stroke-width="2"/>
    <!-- Petal 6 (upper-left) -->
    <use href="#hex" x="-78" y="-45" fill="#1a3a5c" fill-opacity="0.85" stroke="#58a6ff" stroke-width="2"/>

    <!-- Center hexagon (distinct color) -->
    <use href="#hex" x="0" y="0" fill="#2d1a4e" fill-opacity="0.9" stroke="#bc8cff" stroke-width="2.5"/>

    <!-- Cell-graph edges (adjacency connections between cell centers) -->
    <!-- Center to all petals -->
    <line x1="0" y1="0" x2="0" y2="-90" class="edge-line" />
    <line x1="0" y1="0" x2="78" y2="-45" class="edge-line" />
    <line x1="0" y1="0" x2="78" y2="45" class="edge-line" />
    <line x1="0" y1="0" x2="0" y2="90" class="edge-line" />
    <line x1="0" y1="0" x2="-78" y2="45" class="edge-line" />
    <line x1="0" y1="0" x2="-78" y2="-45" class="edge-line" />
    <!-- Petal-to-petal ring (adjacent petals share an edge) -->
    <line x1="0" y1="-90" x2="78" y2="-45" class="edge-line" />
    <line x1="78" y1="-45" x2="78" y2="45" class="edge-line" />
    <line x1="78" y1="45" x2="0" y2="90" class="edge-line" />
    <line x1="0" y1="90" x2="-78" y2="45" class="edge-line" />
    <line x1="-78" y1="45" x2="-78" y2="-45" class="edge-line" />
    <line x1="-78" y1="-45" x2="0" y2="-90" class="edge-line" />

    <!-- Cell-graph vertex dots (cell centers) -->
    <circle cx="0" cy="0" r="5" fill="#bc8cff" stroke="#0d1117" stroke-width="1.5"/>
    <circle cx="0" cy="-90" r="4" fill="#58a6ff" stroke="#0d1117" stroke-width="1"/>
    <circle cx="78" cy="-45" r="4" fill="#58a6ff" stroke="#0d1117" stroke-width="1"/>
    <circle cx="78" cy="45" r="4" fill="#58a6ff" stroke="#0d1117" stroke-width="1"/>
    <circle cx="0" cy="90" r="4" fill="#58a6ff" stroke="#0d1117" stroke-width="1"/>
    <circle cx="-78" cy="45" r="4" fill="#58a6ff" stroke="#0d1117" stroke-width="1"/>
    <circle cx="-78" cy="-45" r="4" fill="#58a6ff" stroke="#0d1117" stroke-width="1"/>

    <!-- C₆ rotation arrow (subtle) -->
    <path d="M 38,-80 A 88,88 0 0 1 82,-10" fill="none" stroke="#484f58" stroke-width="1.2" stroke-dasharray="4,3"/>
    <polygon points="82,-10 76,-20 86,-18" fill="#484f58"/>
    <text x="72" y="-68" class="subtitle" font-size="10" fill="#484f58">C₆</text>

    <!-- √7 scale indicator -->
    <line x1="-110" y1="130" x2="110" y2="130" stroke="#484f58" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="-110" y1="125" x2="-110" y2="135" stroke="#484f58" stroke-width="1"/>
    <line x1="110" y1="125" x2="110" y2="135" stroke="#484f58" stroke-width="1"/>
    <text x="0" y="148" text-anchor="middle" class="subtitle">√7 · λ</text>

  </g>

  <!-- Legend panel -->
  <g transform="translate(370, 78)">
    <rect x="0" y="0" width="190" height="310" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="95" y="24" text-anchor="middle" class="label-bold">Graph Topology</text>
    <line x1="12" y1="34" x2="178" y2="34" stroke="#30363d" stroke-width="1"/>

    <!-- Legend entries -->
    <!-- Center cell -->
    <rect x="16" y="48" width="16" height="16" rx="3" fill="#2d1a4e" stroke="#bc8cff" stroke-width="1.5"/>
    <text x="40" y="61" class="legend-text">Center cell</text>
    <text x="174" y="61" text-anchor="end" class="legend-val">deg 6</text>

    <!-- Petal cell -->
    <rect x="16" y="74" width="16" height="16" rx="3" fill="#1a3a5c" stroke="#58a6ff" stroke-width="1.5"/>
    <text x="40" y="87" class="legend-text">Petal cells (×6)</text>
    <text x="174" y="87" text-anchor="end" class="legend-val">deg 3</text>

    <line x1="12" y1="100" x2="178" y2="100" stroke="#21262d" stroke-width="1"/>

    <!-- Topology values -->
    <text x="16" y="120" class="legend-text">Vertices (V)</text>
    <text x="174" y="120" text-anchor="end" class="legend-val">24</text>

    <text x="16" y="142" class="legend-text">Edges (E)</text>
    <text x="174" y="142" text-anchor="end" class="legend-val">30</text>

    <text x="16" y="164" class="legend-text">Faces (F)</text>
    <text x="174" y="164" text-anchor="end" class="legend-val">7</text>

    <text x="16" y="186" class="legend-text">Euler char (χ)</text>
    <text x="174" y="186" text-anchor="end" class="legend-val">1</text>

    <line x1="12" y1="198" x2="178" y2="198" stroke="#21262d" stroke-width="1"/>

    <!-- Spectral properties -->
    <text x="16" y="218" class="legend-text">Symmetry</text>
    <text x="174" y="218" text-anchor="end" class="legend-val">C₆</text>

    <text x="16" y="240" class="legend-text">Spectral radius (ρ)</text>
    <text x="174" y="240" text-anchor="end" class="legend-val">1+√7</text>

    <text x="16" y="262" class="legend-text">Tr(A⁴)</text>
    <text x="174" y="262" text-anchor="end" class="legend-val">204</text>

    <text x="16" y="284" class="legend-text">Blocking factor</text>
    <text x="174" y="284" text-anchor="end" class="legend-val">√7</text>

    <text x="16" y="302" class="legend-text">4D cells (A₂×A₂)</text>
    <text x="174" y="302" text-anchor="end" class="legend-val">49</text>

  </g>

</svg>
