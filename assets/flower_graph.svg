<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" width="560" height="360">
  <defs>
    <style>
      text { font-family: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif; }
      .title { font-size: 15px; fill: #e6edf3; font-weight: 600; }
      .subtitle { font-size: 10.5px; fill: #8b949e; }
      .legend-label { font-size: 11.5px; fill: #c9d1d9; }
      .legend-value { font-family: 'SF Mono', 'Cascadia Code', Consolas, monospace; font-size: 11.5px; fill: #79c0ff; }
      .legend-head { font-size: 12px; fill: #e6edf3; font-weight: 600; }
    </style>
    <!-- Pointy-top hexagon: circumradius 46, vertices at 60° intervals from top -->
    <polygon id="hex" points="0,-46 39.8,-23 39.8,23 0,46 -39.8,23 -39.8,-23"/>
  </defs>

  <!-- Background (GitHub dark) -->
  <rect width="560" height="360" rx="6" fill="#0d1117"/>
  <rect x=".5" y=".5" width="559" height="359" rx="5.5" fill="none" stroke="#30363d" stroke-width="1"/>

  <!-- Title bar -->
  <text x="280" y="28" text-anchor="middle" class="title">7-Cell Hexagonal Flower Graph</text>
  <text x="280" y="44" text-anchor="middle" class="subtitle">Fundamental blocking unit — V=24, E=30, F=7, χ=1</text>

  <!-- ═══ FLOWER (centered at 180, 195) ═══ -->
  <g transform="translate(180,198)">

    <!-- Petal hexagons -->
    <use href="#hex" x="79.7" y="0" fill="#11243a" stroke="#2f81f7" stroke-width="1.5" stroke-linejoin="round"/>
    <use href="#hex" x="39.8" y="-69" fill="#11243a" stroke="#2f81f7" stroke-width="1.5" stroke-linejoin="round"/>
    <use href="#hex" x="-39.8" y="-69" fill="#11243a" stroke="#2f81f7" stroke-width="1.5" stroke-linejoin="round"/>
    <use href="#hex" x="-79.7" y="0" fill="#11243a" stroke="#2f81f7" stroke-width="1.5" stroke-linejoin="round"/>
    <use href="#hex" x="-39.8" y="69" fill="#11243a" stroke="#2f81f7" stroke-width="1.5" stroke-linejoin="round"/>
    <use href="#hex" x="39.8" y="69" fill="#11243a" stroke="#2f81f7" stroke-width="1.5" stroke-linejoin="round"/>

    <!-- Center hexagon -->
    <use href="#hex" x="0" y="0" fill="#271a3f" stroke="#a371f7" stroke-width="2" stroke-linejoin="round"/>

    <!-- Cell-adjacency graph overlay -->
    <!-- Center → 6 petals -->
    <g stroke="#8b949e" stroke-width="1" stroke-opacity="0.45">
      <line x1="0" y1="0" x2="79.7" y2="0"/>
      <line x1="0" y1="0" x2="39.8" y2="-69"/>
      <line x1="0" y1="0" x2="-39.8" y2="-69"/>
      <line x1="0" y1="0" x2="-79.7" y2="0"/>
      <line x1="0" y1="0" x2="-39.8" y2="69"/>
      <line x1="0" y1="0" x2="39.8" y2="69"/>
    </g>
    <!-- Petal ring -->
    <g stroke="#8b949e" stroke-width="1" stroke-opacity="0.35">
      <line x1="79.7" y1="0" x2="39.8" y2="-69"/>
      <line x1="39.8" y1="-69" x2="-39.8" y2="-69"/>
      <line x1="-39.8" y1="-69" x2="-79.7" y2="0"/>
      <line x1="-79.7" y1="0" x2="-39.8" y2="69"/>
      <line x1="-39.8" y1="69" x2="39.8" y2="69"/>
      <line x1="39.8" y1="69" x2="79.7" y2="0"/>
    </g>

    <!-- Node dots -->
    <circle cx="0" cy="0" r="4" fill="#a371f7"/>
    <g fill="#2f81f7">
      <circle cx="79.7" cy="0" r="3"/>
      <circle cx="39.8" cy="-69" r="3"/>
      <circle cx="-39.8" cy="-69" r="3"/>
      <circle cx="-79.7" cy="0" r="3"/>
      <circle cx="-39.8" cy="69" r="3"/>
      <circle cx="39.8" cy="69" r="3"/>
    </g>

  </g>

  <!-- ═══ LEGEND ═══ -->
  <g transform="translate(335,68)">
    <rect x="0" y="0" width="205" height="266" rx="5" fill="#161b22" stroke="#30363d" stroke-width="1"/>

    <!-- Color key -->
    <text x="14" y="22" class="legend-head">Color Key</text>
    <line x1="10" y1="30" x2="195" y2="30" stroke="#21262d"/>

    <rect x="14" y="40" width="12" height="12" rx="2" fill="#271a3f" stroke="#a371f7" stroke-width="1.2"/>
    <text x="34" y="51" class="legend-label">Center cell</text>
    <text x="191" y="51" text-anchor="end" class="legend-value">deg 6</text>

    <rect x="14" y="60" width="12" height="12" rx="2" fill="#11243a" stroke="#2f81f7" stroke-width="1.2"/>
    <text x="34" y="71" class="legend-label">Petal cells ×6</text>
    <text x="191" y="71" text-anchor="end" class="legend-value">deg 3</text>

    <!-- Topology -->
    <line x1="10" y1="84" x2="195" y2="84" stroke="#21262d"/>
    <text x="14" y="104" class="legend-head">CW-Complex</text>

    <text x="14" y="124" class="legend-label">Vertices (V)</text>
    <text x="191" y="124" text-anchor="end" class="legend-value">24</text>
    <text x="14" y="142" class="legend-label">Edges (E)</text>
    <text x="191" y="142" text-anchor="end" class="legend-value">30</text>
    <text x="14" y="160" class="legend-label">Faces (F)</text>
    <text x="191" y="160" text-anchor="end" class="legend-value">7</text>
    <text x="14" y="178" class="legend-label">Euler char (χ)</text>
    <text x="191" y="178" text-anchor="end" class="legend-value">1</text>

    <!-- Spectrum -->
    <line x1="10" y1="191" x2="195" y2="191" stroke="#21262d"/>
    <text x="14" y="211" class="legend-head">Spectral</text>

    <text x="14" y="231" class="legend-label">ρ(A)</text>
    <text x="191" y="231" text-anchor="end" class="legend-value">1 + √7</text>
    <text x="14" y="249" class="legend-label">Tr(A⁴)</text>
    <text x="191" y="249" text-anchor="end" class="legend-value">204</text>

  </g>

</svg>
